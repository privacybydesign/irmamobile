name: yivi
description: "Yivi App"

# A build number cannot be reused once a build is in use on Android.
version: 8.1.0+4194514

publish_to: none

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sentry_flutter: ^9.4.0
  yivi_core:
    path: ../yivi_core
  google_mlkit_text_recognition: ^0.15.0
  google_mlkit_commons: ^0.11.0
  mobile_scanner: ^7.2.0
  camera: ^0.12.0+1
  smart_auth: ^3.2.0
  pinput: ^6.0.1

  # Regula Face SDK for the client-side liveness session (face verification).
  # The MIT-licensed Dart plugin plus the Regula native core; kept out of
  # yivi_core so the FOSS yivi_fdroid build does not depend on it. The concrete
  # RegulaFaceService implementation lives in lib/regula_face_service.dart and
  # is injected via runYiviApp(regulaFaceService: ...).
  flutter_face_api: ^8.2.1149
  flutter_face_core_basic: ^8.2.461

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Used only by `lib/credential_card_previews.dart` to pre-load Alexandria /
  # Open Sans for widget previews. Loaded at runtime from Google's CDN so the
  # previews don't depend on bundled-font asset resolution, which is flaky
  # under `flutter widget-preview`.
  google_fonts: ^8.1.0

  # the following packages are required by the integration tests
  vcmrtd:
    git:
      url: https://github.com/privacybydesign/vcmrtd.git
      # Must match the ref in yivi_core/pubspec.yaml.
      ref: 7c6b1d59978ef374e4289e28c92affea2419906e
      path: vcmrtd
  package_info_plus: ^10.1.0
  collection: ^1.18.0
  flutter_riverpod: ^3.2.0
  rxdart: ^0.28.0
  # Integration tests inject a fake LocalAuthentication (see
  # integration_test/helpers/fake_local_auth.dart) to drive biometric flows
  # without the real OS prompt. local_auth itself comes via yivi_core.
  local_auth: ^3.0.1
  mrz_parser:
    git:
      url: https://github.com/privacybydesign/mrz_parser
      ref: v3.0.0

flutter:
  uses-material-design: true
