name: yivi
description: "Yivi App"

# A build number cannot be reused once a build is in use on Android.
version: 8.0.0+4194509

publish_to: none

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sentry_flutter: ^9.4.0
  yivi_core:
    path: ../yivi_core
  google_mlkit_text_recognition: ^0.15.0
  google_mlkit_commons: ^0.11.0
  camera: ^0.10.0+4
  smart_auth: ^3.2.0
  pinput: ^6.0.1

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Used only by `lib/credential_card_previews.dart` to pre-load Alexandria /
  # Open Sans for widget previews. Loaded at runtime from Google's CDN so the
  # previews don't depend on bundled-font asset resolution, which is flaky
  # under `flutter widget-preview`.
  google_fonts: ^8.1.0

  # the following packages are required by the integration tests
  vcmrtd:
    git:
      url: https://github.com/privacybydesign/vcmrtd.git
      ref: v3.8.0
  package_info_plus: ^9.0.0
  collection: ^1.18.0
  flutter_riverpod: ^3.2.0
  rxdart: ^0.28.0
  mrz_parser:
    git:
      url: https://github.com/privacybydesign/mrz_parser
      ref: v3.0.0

flutter:
  uses-material-design: true
