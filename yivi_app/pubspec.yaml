name: yivi
description: "Yivi App"

# A build number cannot be reused once a build is in use on Android.
version: 8.1.1+4194515

publish_to: none

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sentry_flutter: ^9.4.0
  yivi_core:
    path: ../yivi_core
  google_mlkit_text_recognition: ^0.15.0
  google_mlkit_commons: ^0.11.0
  mobile_scanner: ^7.2.0
  camera: ^0.12.0+1
  smart_auth: ^3.2.0
  pinput: ^6.0.1
  in_app_review: ^2.0.10

  flutter_i18n: any
  flutter_localizations:
    sdk: flutter
  flutter_svg: any
  google_fonts: any
  flutter_riverpod: any
dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Used only by `lib/credential_card_previews.dart` to pre-load Alexandria /
  # Open Sans for widget previews. Loaded at runtime from Google's CDN so the
  # previews don't depend on bundled-font asset resolution, which is flaky
  # under `flutter widget-preview`.
  vcmrtd:
    git:
      url: https://github.com/privacybydesign/vcmrtd.git
      ref: v3.8.0
  package_info_plus: ^10.1.0
  collection: ^1.18.0
  rxdart: ^0.28.0
  # Integration tests inject a fake LocalAuthentication (see
  # integration_test/helpers/fake_local_auth.dart) to drive biometric flows
  # without the real OS prompt. local_auth itself comes via yivi_core.
  local_auth: ^3.0.1
  mrz_parser:
    git:
      url: https://github.com/privacybydesign/mrz_parser
      ref: v3.0.0

  plugin_platform_interface: any
  url_launcher_platform_interface: any
  flutter_bloc: any

# yivi_core pulls altcha_lib, which wants pointycastle from pub.dev, but vcmrtd
# wants it from the privacybydesign/pc-dart fork; pub cannot unify a hosted and
# a git source for the same package. Force the fork (it reports version 4.0.0,
# satisfying altcha_lib's ^4.0.0). Must be repeated here because
# dependency_overrides only take effect in the root (app) package.
dependency_overrides:
  pointycastle:
    git:
      url: https://github.com/privacybydesign/pc-dart.git
      ref: master

flutter:
  uses-material-design: true
