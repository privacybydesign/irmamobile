plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    compileSdkVersion 36
    ndkVersion = "28.2.13676358"
    namespace 'foundation.privacybydesign.irmamobile'

    lintOptions {
        disable 'InvalidPackage'
    }

    // Java and Kotlin must target the same JVM version. The app now has Kotlin
    // sources (ImageDecodeChannel/ImageUtil for the JP2 image_channel), so the
    // Kotlin compile task actually runs and its target must match Java's.
    // Same config as the vcmrtd example app.
    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "org.irmacard.cardemu"
        minSdkVersion 26
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    flavorDimensions "track"
    productFlavors {
        alpha {
            dimension "track"
            applicationIdSuffix ".alpha"
        }
        beta {
            dimension "track"
        }
    }

    signingConfigs {
        if (project.hasProperty("keyStoreFile")) {
            release {
                storeFile file(project.property("keyStoreFile"))
                storePassword project.property("keyStorePassword")
                keyAlias project.property("keyAlias")
                keyPassword project.property("keyPassword")
            }
        }
    }

    buildTypes {
        release {
            // Flutter does not support building for x86 in release mode.
            ndk {
                abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"
            }

            if (project.hasProperty("keyStoreFile")) {
                signingConfig signingConfigs.release
            } else {
                // For testing purposes we sign with dummy credentials if no key properties are given.
                signingConfig signingConfigs.debug
            }
        }
    }

    bundle {
        // Store archive and code transparency cannot be combined yet.
        // https://stackoverflow.com/questions/74275816/code-verification-error-when-uploading-aab-files-added-after-transparency-meta
        storeArchive {
            enable = false
        }
        if (project.hasProperty("keyStoreFile")) {
            codeTransparency {
                signing {
                    storeFile file(project.property("keyStoreFile"))
                    storePassword project.property("keyStorePassword")
                    keyAlias project.property("keyAlias")
                    keyPassword project.property("keyPassword")
                }
            }
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "androidx.browser:browser:1.2.0"
    testImplementation 'junit:junit:4.12'
    androidTestImplementation 'androidx.test:runner:1.1.0'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.1.0'

    implementation 'cz.adaptech.tesseract4android:tesseract4android:4.9.0'
    implementation 'org.opencv:opencv:4.9.0'

    // Gemalto JP2 Decoder: decodes JPEG 2000 passport/eID chip photos (DG2)
    // that the Dart `image` package can't handle. Used by ImageDecodeChannel.
    // https://mvnrepository.com/artifact/com.gemalto.jp2/jp2-android
    implementation 'com.gemalto.jp2:jp2-android:1.0.3'
}
