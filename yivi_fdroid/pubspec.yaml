name: yivi
description: "Yivi App"

# A build number cannot be reused once a build is in use on Android.
version: 8.0.0+4194509

publish_to: none

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  camera: ^0.10.0+4
  cupertino_icons: ^1.0.8
  sentry_flutter: ^9.4.0
  # Pinned to 2.2.x: flutter_zxing 2.3.0 requires Dart >=3.11 / Flutter >=3.41,
  # but this toolchain is Dart 3.10 / Flutter 3.38.
  flutter_zxing: 2.2.1
  yivi_core:
    path: ../yivi_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
