name: yivi
description: "Yivi App"

# A build number cannot be reused once a build is in use on Android.
version: 8.1.1+4194515

publish_to: none

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  camera: ^0.12.0+1
  cupertino_icons: ^1.0.8
  sentry_flutter: ^9.4.0
  flutter_zxing: ^2.3.0
  # BSD-licensed official Flutter WebView plugin (wraps the system WebView via
  # androidx.webkit). Hosts Regula's web Face SDK for the FOSS liveness flow so
  # no proprietary native binaries ship in the F-Droid APK (see #665).
  webview_flutter: ^4.13.0
  # Android implementation of webview_flutter (BSD). Referenced directly for
  # AndroidWebViewController to grant the in-page camera permission request.
  webview_flutter_android: ^4.13.0
  yivi_core:
    path: ../yivi_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
