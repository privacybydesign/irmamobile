# Workflow to check whether changes in a pull request fulfill all requirements.
# We execute build stages in separate jobs to prevent artifact duplication.
name: Status checks

on:
  pull_request:
  schedule:
    # Run every sunday at noon. We run this on sunday such that we can utilize the free test minutes we get from Firebase.
    # The weekly run ensures that cached resources don't expire.
    - cron: "0 12 * * 0"

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  # We make sure that lint succeeds before we start any other job to
  # prevent that the setup-build-environment action runs in parallel.
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Compare pubspec versions
        run: |
          # Extract version lines from both pubspecs and make sure they're identical
          APP_VERSION=$(grep -E '^version:' yivi_app/pubspec.yaml | head -n1 | sed 's/version: *//')
          FDROID_VERSION=$(grep -E '^version:' yivi_fdroid/pubspec.yaml | head -n1 | sed 's/version: *//')

          echo "yivi_app    version: $APP_VERSION"
          echo "yivi_fdroid version: $FDROID_VERSION"

          if [ "$APP_VERSION" != "$FDROID_VERSION" ]; then
            echo "::error ::pubspec versions are out of sync!"
            echo "::error ::yivi_app/pubspec.yaml    -> $APP_VERSION"
            echo "::error ::yivi_fdroid/pubspec.yaml -> $FDROID_VERSION"
            exit 1
          fi

          echo "Versions are in sync."
      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
      - name: Install sqlcipher
        run: sudo apt-get update && sudo apt-get install -y libsqlcipher-dev
      - run: bundle exec fastlane lint
  unit-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
      - run: bundle exec fastlane unit_test
  # Discovers every integration_test/*_test.dart and groups them into SHARDS
  # round-robin buckets. Each bucket is one matrix entry consumed by the build
  # and test jobs below.
  #
  # Why sharding instead of one CI job per test file:
  # We have ~28 integration tests. One-job-per-test means ~28 build runners +
  # ~28 test runners per platform, well above GitHub Actions' concurrent-runner
  # cap. Jobs end up queued, and the wall-clock for the whole run is dominated
  # by waiting, not by actual work. Bundling tests into SHARDS groups keeps the
  # total job count manageable while preserving parallelism where it matters.
  #
  # Where parallelism is preserved vs given up:
  # - Build side: each shard builds its tests SEQUENTIALLY on one runner. We
  #   trade build parallelism for amortized per-runner setup cost (checkout,
  #   Flutter install, irmagobridge download, iOS keychain provisioning are
  #   each paid once per shard instead of once per test).
  # - Test side: each shard fires off all its `gcloud firebase test ...` calls
  #   IN PARALLEL via bash `& ... wait`. The GHA runner is just a thin
  #   orchestrator; the actual device-time happens on Firebase Test Lab, so we
  #   still get the same total simultaneous Firebase device runs as one-job-
  #   per-test would, but on far fewer GHA runners.
  #
  # Why round-robin (and not contiguous slices):
  # Test files in adjacent positions of the sorted list often belong to the
  # same category (e.g. all 3 disclosure_session/* tests are adjacent), and
  # within a category runtimes tend to be similar. Within a shard, test
  # wall-clock is the MAX of its tests (parallel), so co-locating slow tests
  # in one shard makes that shard the bottleneck. Round-robin spreads
  # category-clustered tests across shards without needing per-test runtime
  # data.
  #
  # Tuning SHARDS:
  # Higher SHARDS = more wall-clock parallelism but more setup-tax
  # duplication and more GHA-runner queue pressure. Lower SHARDS = less
  # wall-clock parallelism but cheaper. 4 is the working balance for ~28
  # tests; change here if either count shifts substantially.
  discover-integration-tests:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Generate sharded matrix from integration_test files
        id: set-matrix
        working-directory: yivi_app
        run: |
          SHARDS=4
          files=( $(find integration_test -name '*_test.dart' | sort) )
          declare -a shard_files
          for i in "${!files[@]}"; do
            s=$(( i % SHARDS ))
            shard_files[$s]+="${files[$i]} "
          done
          matrix='['
          for s in $(seq 0 $((SHARDS-1))); do
            fs="${shard_files[$s]% }"
            matrix+="{\"shard\":$s,\"files\":\"$fs\"}"
            [ $s -lt $((SHARDS-1)) ] && matrix+=","
          done
          matrix+=']'
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
  build-irmagobridge-ios:
    runs-on: macos-15 # MacOS version is pinned, because it determines which XCode version is used.
    needs: lint
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
      - run: bundle exec fastlane ios_build_irmagobridge
      - uses: actions/upload-artifact@v4
        with:
          name: irmagobridge-ios
          path: yivi_core/ios/Irmagobridge.xcframework/
  build-irmagobridge-android:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
      - run: bundle exec fastlane android_build_irmagobridge
      - uses: actions/upload-artifact@v4
        with:
          name: irmagobridge-android
          path: yivi_core/android/irmagobridge/irmagobridge.aar
  build-prototypes-android:
    runs-on: ubuntu-latest
    needs: build-irmagobridge-android
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
      - name: Download irmagobridge artifact
        uses: actions/download-artifact@v4
        with:
          name: irmagobridge-android
          path: yivi_core/android/irmagobridge/
      - run: cd yivi_app && flutter build apk --flavor alpha -t lib/main_prototypes.dart
      - uses: actions/upload-artifact@v4
        with:
          name: prototypes-alpha-android
          path: ./build/app/outputs/apk/alpha/release/*.apk
  build-app-ios-alpha:
    runs-on: macos-15 # MacOS version is pinned, because it determines which XCode version is used.
    needs: build-irmagobridge-ios
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
      - name: Download irmagobridge artifact
        uses: actions/download-artifact@v4
        with:
          name: irmagobridge-ios
          path: yivi_core/ios/Irmagobridge.xcframework/
      - name: Decode binary environment secrets
        env:
          APPLE_DEVELOPMENT_CERTIFICATE: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE }}
          APPLE_DEVELOPMENT_PROVISIONING_PROFILE: ${{ secrets.APPLE_DEVELOPMENT_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ./fastlane/profiles
          echo $APPLE_DEVELOPMENT_CERTIFICATE | base64 --decode > ./fastlane/profiles/ios_development.p12
          echo $APPLE_DEVELOPMENT_PROVISIONING_PROFILE | base64 --decode > ./fastlane/profiles/development.mobileprovision
      - name: Build
        run: >
          bundle exec fastlane ios_build_app
          flavor:alpha
          certificate_path:profiles/ios_development.p12
          certificate_password:${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_PASSWORD }}
          provisioning_profile_path:profiles/development.mobileprovision
          code_signing_identity:"iPhone Developer"
      - uses: actions/upload-artifact@v4
        with:
          name: app-alpha-ios
          path: ./fastlane/build/*.ipa
  build-app-android-fdroid:
    runs-on: ubuntu-latest
    needs: build-irmagobridge-android
    strategy:
      matrix:
        flavor: [alpha, beta]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
      - name: Download irmagobridge artifact
        uses: actions/download-artifact@v4
        with:
          name: irmagobridge-android
          path: yivi_core/android/irmagobridge/
      - name: Build
        run: |
          cd yivi_fdroid
          flutter build apk --flavor ${{ matrix.flavor }}
      - uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.flavor }}-android-fdroid
          path: ./yivi_fdroid/build/app/outputs/apk/${{ matrix.flavor }}/release/*.apk
  build-app-android:
    runs-on: ubuntu-latest
    needs: build-irmagobridge-android
    strategy:
      matrix:
        flavor: [alpha, beta]
        type: [apk, appbundle]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
      - name: Download irmagobridge artifact
        uses: actions/download-artifact@v4
        with:
          name: irmagobridge-android
          path: yivi_core/android/irmagobridge/
      - name: Decode binary environment secrets
        env:
          ANDROID_DEVELOPMENT_SIGNING_KEYSTORE: ${{ secrets.ANDROID_DEVELOPMENT_SIGNING_KEYSTORE }}
        run: |
          mkdir -p ./fastlane/profiles
          echo $ANDROID_DEVELOPMENT_SIGNING_KEYSTORE | base64 --decode > ./fastlane/profiles/keystore.jks
      - name: Build
        run: >
          bundle exec fastlane android_build_${{ matrix.type }}
          flavor:${{ matrix.flavor }}
          keystore_path:profiles/keystore.jks
          key_alias:android-signing-development
          keystore_password:${{ secrets.ANDROID_DEVELOPMENT_SIGNING_KEYSTORE_PASSWORD }}
          key_password:${{ secrets.ANDROID_DEVELOPMENT_SIGNING_KEYSTORE_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.flavor }}-android-${{ matrix.type }}
          path: ./fastlane/build/*
  # One job per shard; each builds its ~7 test files sequentially and uploads
  # a single per-shard artifact consumed by integration-test-ios below. See
  # discover-integration-tests for the rationale behind sharding.
  build-integration-test-ios:
    runs-on: macos-15 # MacOS version is pinned, because it determines which XCode version is used.
    needs:
      - build-irmagobridge-ios
      - discover-integration-tests
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover-integration-tests.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
      - name: Download irmagobridge artifact
        uses: actions/download-artifact@v4
        with:
          name: irmagobridge-ios
          path: yivi_core/ios/Irmagobridge.xcframework/
      - name: Decode binary environment secrets
        env:
          APPLE_DEVELOPMENT_CERTIFICATE: ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE }}
          APPLE_DEVELOPMENT_PROVISIONING_PROFILE: ${{ secrets.APPLE_DEVELOPMENT_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ./fastlane/profiles
          echo $APPLE_DEVELOPMENT_CERTIFICATE | base64 --decode > ./fastlane/profiles/ios_development.p12
          echo $APPLE_DEVELOPMENT_PROVISIONING_PROFILE | base64 --decode > ./fastlane/profiles/development.mobileprovision
      - name: Prepare integration test build
        run: >
          bundle exec fastlane prepare_ios_integration_test_build
          certificate_path:profiles/ios_development.p12
          certificate_password:${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE_PASSWORD }}
          provisioning_profile_path:profiles/development.mobileprovision
          code_signing_identity:"iPhone Developer"
      - name: Build each test file in shard
        run: |
          for tf in ${{ matrix.files }}; do
            echo "::group::Build $tf"
            bundle exec fastlane ios_build_integration_test test_file:"$tf"
            echo "::endgroup::"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: integration-test-ios-shard-${{ matrix.shard }}
          path: ./fastlane/build/*_ios_tests.zip
  # One job per shard; each builds its ~7 test files sequentially and uploads
  # a single per-shard artifact consumed by integration-test-android below.
  # See discover-integration-tests for the rationale behind sharding.
  build-integration-test-android:
    runs-on: ubuntu-latest
    needs:
      - build-irmagobridge-android
      - discover-integration-tests
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover-integration-tests.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true
      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          sudo docker system prune -af || true
          df -h
      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
      - name: Download irmagobridge artifact
        uses: actions/download-artifact@v4
        with:
          name: irmagobridge-android
          path: yivi_core/android/irmagobridge/
      - name: Prepare integration test build
        run: bundle exec fastlane prepare_android_integration_test_build
      - name: Build each test file in shard
        run: |
          for tf in ${{ matrix.files }}; do
            echo "::group::Build $tf"
            bundle exec fastlane android_build_integration_test test_file:"$tf"
            echo "::endgroup::"
          done
      - name: Cleanup build caches
        if: always()
        run: |
          df -h
          rm -rf ~/.gradle/caches || true
          rm -rf ~/.gradle/wrapper || true
          rm -rf ~/.android || true
          rm -rf ~/.pub-cache || true
          df -h
      - uses: actions/upload-artifact@v4
        with:
          name: integration-test-android-shard-${{ matrix.shard }}
          path: |
            ./fastlane/build/*_app.apk
            ./fastlane/build/*_androidTest.apk
  # One job per shard; each downloads its matching build artifact and fires
  # off all ~7 `gcloud firebase test ios run` calls IN PARALLEL on a single
  # runner (bash `& ... wait`). Firebase Test Lab does the device work, so
  # the runner is just an orchestrator. See discover-integration-tests for
  # why we shard.
  integration-test-ios:
    runs-on: ubuntu-latest
    container: google/cloud-sdk:latest
    needs:
      - build-integration-test-ios
      - discover-integration-tests
      - unit-test # To prevent that test resources are used when we already know there is an issue.
    strategy:
      matrix:
        include: ${{ fromJson(needs.discover-integration-tests.outputs.matrix) }}
      fail-fast: false # To prevent we have to re-run all tests when one run is flaky.
    concurrency: integration-test-ios-shard-${{ matrix.shard }} # To prevent that we use too much test resources at the same time.
    steps:
      - name: Download test artifact
        uses: actions/download-artifact@v4
        with:
          name: integration-test-ios-shard-${{ matrix.shard }}
          path: .
      - name: Authenticate to Firebase
        env:
          GCLOUD_SERVICE_KEY: ${{ secrets.GCLOUD_SERVICE_KEY }}
        run: gcloud auth activate-service-account --key-file <(echo $GCLOUD_SERVICE_KEY)
        shell: bash
      - name: Set Firebase project
        run: gcloud config set project ${{ secrets.GCLOUD_PROJECT_NAME }}
      - name: Run integration tests in parallel
        shell: bash
        run: |
          pids=()
          names=()
          for tf in ${{ matrix.files }}; do
            test_name=$(basename "$tf" .dart)
            names+=("$test_name")
            (
              gcloud firebase test ios run \
                --test "${test_name}_ios_tests.zip" \
                --timeout 10m \
                --device=model=iphone16pro,orientation=portrait,version=18.3 \
                --device=model=iphone16pro,orientation=landscape,version=18.3 \
                > "${test_name}.log" 2>&1
            ) &
            pids+=($!)
          done
          failed=0
          for i in "${!pids[@]}"; do
            if ! wait "${pids[i]}"; then failed=1; fi
            echo "::group::Test ${names[i]}"
            cat "${names[i]}.log"
            echo "::endgroup::"
          done
          exit $failed
  # this summary is needed to report a final result for the ios build+test matrices
  # this job is added to the branch protection rules, so both matrices have to fully pass before merge
  integration-test-ios-summary:
    runs-on: ubuntu-latest
    needs:
      - build-integration-test-ios
      - integration-test-ios
    if: ${{ always() }} # Run even if a matrix job fails
    steps:
      - name: Check build+test matrix results
        run: |
          for r in "${{ needs.build-integration-test-ios.result }}" \
                   "${{ needs.integration-test-ios.result }}"; do
            if [ "$r" != "success" ]; then
              echo "One or more integration test stages failed: $r"
              exit 1
            fi
          done
          echo "All integration test stages passed."
  # One job per shard; each downloads its matching build artifact and fires
  # off all ~7 `gcloud firebase test android run` calls IN PARALLEL on a
  # single runner (bash `& ... wait`). Firebase Test Lab does the device
  # work, so the runner is just an orchestrator. See discover-integration-
  # tests for why we shard.
  integration-test-android:
    runs-on: ubuntu-latest
    container: google/cloud-sdk:latest
    needs:
      - build-integration-test-android
      - discover-integration-tests
      - unit-test # To prevent that test resources are used when we already know there is an issue.
    strategy:
      matrix:
        include: ${{ fromJson(needs.discover-integration-tests.outputs.matrix) }}
      fail-fast: false # To prevent we have to re-run all tests when one run is flaky.
    concurrency: integration-test-android-shard-${{ matrix.shard }} # To prevent that we use too much test resources at the same time.
    steps:
      - name: Download test artifact
        uses: actions/download-artifact@v4
        with:
          name: integration-test-android-shard-${{ matrix.shard }}
          path: .
      - name: Authenticate to Firebase
        env:
          GCLOUD_SERVICE_KEY: ${{ secrets.GCLOUD_SERVICE_KEY }}
        run: gcloud auth activate-service-account --key-file <(echo $GCLOUD_SERVICE_KEY)
        shell: bash
      - name: Set Firebase project
        run: gcloud config set project ${{ secrets.GCLOUD_PROJECT_NAME }}
      - name: Run integration tests in parallel
        # komodo = Pixel 9 Pro XL
        shell: bash
        run: |
          pids=()
          names=()
          for tf in ${{ matrix.files }}; do
            test_name=$(basename "$tf" .dart)
            names+=("$test_name")
            (
              gcloud firebase test android run \
                --use-orchestrator \
                --app "${test_name}_app.apk" \
                --test "${test_name}_androidTest.apk" \
                --timeout 15m \
                --device=model=komodo,version=34,orientation=portrait \
                --device=model=komodo,version=34,orientation=landscape \
                > "${test_name}.log" 2>&1
            ) &
            pids+=($!)
          done
          failed=0
          for i in "${!pids[@]}"; do
            if ! wait "${pids[i]}"; then failed=1; fi
            echo "::group::Test ${names[i]}"
            cat "${names[i]}.log"
            echo "::endgroup::"
          done
          exit $failed
  # this summary is needed to report a final result for the android build+test matrices
  # this job is added to the branch protection rules, so both matrices have to fully pass before merge
  integration-test-android-summary:
    runs-on: ubuntu-latest
    needs:
      - build-integration-test-android
      - integration-test-android
    if: ${{ always() }} # Run even if a matrix job fails
    steps:
      - name: Check build+test matrix results
        run: |
          for r in "${{ needs.build-integration-test-android.result }}" \
                   "${{ needs.integration-test-android.result }}"; do
            if [ "$r" != "success" ]; then
              echo "One or more integration test stages failed: $r"
              exit 1
            fi
          done
          echo "All integration test stages passed."
